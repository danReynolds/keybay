# Workspace root — not a published package. It exists only to give the two
# Keybay packages a single, shared dependency resolution (one pubspec.lock).
# The packages publish independently from their own directories:
#   packages/keybay      → the core library (pub.dev: keybay)
#   packages/keybay_cli  → the CLI (pub.dev: keybay_cli, Homebrew, GitHub release)
name: keybay_workspace
publish_to: none

environment:
  sdk: ^3.6.0

workspace:
  - packages/keybay
  - packages/keybay_cli
